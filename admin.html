<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arban School - Панель управления</title>
    <style>
        :root {
            --purple: #8A2BE2;
            --purple-dark: #5A189A;
            --yellow: #FFD600;
            --bg-gray: #F3F4F6;
            --card-bg: #FFFFFF;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: #1F2937;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--purple-dark);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        header p {
            color: #6B7280;
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--purple);
            margin: 25px 0 15px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-group.row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #374151;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            background: #FAFAFA;
        }

        input:focus, textarea:focus {
            border-color: var(--purple);
            background: #FFF;
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .admin-card-block {
            background: #F9FAFB;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .admin-card-block h4 {
            color: var(--purple-dark);
            margin-bottom: 10px;
            font-size: 0.95rem;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 5px;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #F9FAFB;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .price-item {
            display: flex;
            flex-direction: column;
        }

        .price-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .price-input-wrapper input {
            padding-right: 30px;
        }

        .price-input-wrapper::after {
            content: "₽";
            position: absolute;
            right: 12px;
            color: #9CA3AF;
            font-weight: bold;
        }

        .token-card {
            background: #EEF2F6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px dashed var(--purple);
        }

        .color-picker-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker-wrapper input[type="color"] {
            width: 46px;
            height: 42px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: #FFF;
            padding: 2px;
        }

        .save-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.2);
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .save-btn:hover {
            background: var(--purple-dark);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3);
        }

        #status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-success {
            background-color: #DEF7EC;
            color: #03543F;
            border: 1px solid #BCF0DA;
        }

        .status-error {
            background-color: #FDE8E8;
            color: #9B1C1C;
            border: 1px solid #F8B4B4;
        }

        .status-loading {
            background-color: #E1EFFE;
            color: #1E429F;
            border: 1px solid #B3D1FF;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Управление контентом Arban School</h1>
            <p>Редактирование заголовков, карточек, контактов, оформлений и тарифов</p>
        </header>

        <div class="token-card">
            <div class="field-group">
                <label for="gh-token">Ключ доступа к GitHub (Personal Access Token):</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="current-password">
            </div>
            <div class="field-group row">
                <div>
                    <label for="gh-owner">Логин на GitHub:</label>
                    <input type="text" id="gh-owner" placeholder="ArbanSchool">
                </div>
                <div>
                    <label for="gh-repo">Репозиторий:</label>
                    <input type="text" id="gh-repo" placeholder="arbanschool.github.io">
                </div>
            </div>
        </div>

        <div class="section-title">🌐 Общие настройки</div>
        <div class="field-group">
            <label for="site-title">Название вкладки сайта (Title):</label>
            <input type="text" id="site-title">
        </div>
        
        <div class="field-group row">
            <div>
                <label for="logo-url">Путь к логотипу (ссылка или имя файла):</label>
                <input type="text" id="logo-url" placeholder="logo.png">
            </div>
            <div>
                <label for="logo-fallback-text">Буква логотипа (если нет картинки):</label>
                <input type="text" id="logo-fallback-text" maxlength="3">
            </div>
        </div>

        <div class="section-title">📚 Настройки оформления книг</div>
        <div class="field-group row">
            <div>
                <label for="book-fill-color">Цвет заливки книг:</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="book-fill-picker" onchange="document.getElementById('book-fill-color').value = this.value">
                    <input type="text" id="book-fill-color" placeholder="#FFD600" onchange="document.getElementById('book-fill-picker').value = this.value">
                </div>
            </div>
            <div>
                <label for="book-stroke-color">Цвет контура книг:</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="book-stroke-picker" onchange="document.getElementById('book-stroke-color').value = this.value">
                    <input type="text" id="book-stroke-color" placeholder="#8A2BE2" onchange="document.getElementById('book-stroke-picker').value = this.value">
                </div>
            </div>
        </div>

        <div class="section-title">👋 Первый экран (Приветствие)</div>
        <div class="field-group">
            <label for="welcome-title">Главный заголовок:</label>
            <input type="text" id="welcome-title">
        </div>
        <div class="field-group">
            <label for="welcome-subtitle">Подзаголовок:</label>
            <input type="text" id="welcome-subtitle">
        </div>

        <div class="section-title">🧮 Прайс-лист калькулятора</div>
        <div class="field-group">
            <label for="calc-title">Заголовок калькулятора:</label>
            <input type="text" id="calc-title">
        </div>

        <label style="margin-top: 10px; display:block;">Уроки по 40 минут:</label>
        <div class="price-grid" style="margin-bottom: 20px;">
            <div class="price-item">
                <label for="p-ind-40">Индивидуально</label>
                <div class="price-input-wrapper"><input type="text" id="p-ind-40"></div>
            </div>
            <div class="price-item">
                <label for="p-pair-40">В паре</label>
                <div class="price-input-wrapper"><input type="text" id="p-pair-40"></div>
            </div>
            <div class="price-item">
                <label for="p-group-40">В группе</label>
                <div class="price-input-wrapper"><input type="text" id="p-group-40"></div>
            </div>
        </div>

        <label style="display:block;">Уроки по 60 минут:</label>
        <div class="price-grid">
            <div class="price-item">
                <label for="p-ind-60">Индивидуально</label>
                <div class="price-input-wrapper"><input type="text" id="p-ind-60"></div>
            </div>
            <div class="price-item">
                <label for="p-pair-60">В паре</label>
                <div class="price-input-wrapper"><input type="text" id="p-pair-60"></div>
            </div>
            <div class="price-item">
                <label for="p-group-60">В группе</label>
                <div class="price-input-wrapper"><input type="text" id="p-group-60"></div>
            </div>
        </div>

        <div class="section-title">📖 Третий экран (О нас — 3 карточки)</div>
        <div class="field-group">
            <label for="about-title">Главный заголовок секции:</label>
            <input type="text" id="about-title">
        </div>

        <div class="admin-card-block">
            <h4>Карточка №1</h4>
            <div class="field-group">
                <label for="c1-title">Заголовок карточки:</label>
                <input type="text" id="c1-title">
            </div>
            <div class="field-group">
                <label for="c1-text">Текст карточки:</label>
                <textarea id="c1-text"></textarea>
            </div>
        </div>

        <div class="admin-card-block">
            <h4>Карточка №2</h4>
            <div class="field-group">
                <label for="c2-title">Заголовок карточки:</label>
                <input type="text" id="c2-title">
            </div>
            <div class="field-group">
                <label for="c2-text">Текст карточки:</label>
                <textarea id="c2-text"></textarea>
            </div>
        </div>

        <div class="admin-card-block">
            <h4>Карточка №3</h4>
            <div class="field-group">
                <label for="c3-title">Заголовок карточки:</label>
                <input type="text" id="c3-title">
            </div>
            <div class="field-group">
                <label for="c3-text">Текст карточки:</label>
                <textarea id="c3-text"></textarea>
            </div>
        </div>

        <div class="section-title">📞 Контакты</div>
        <div class="field-group">
            <label for="contacts-title">Заголовок секции:</label>
            <input type="text" id="contacts-title">
        </div>
        <div class="field-group">
            <label for="contact-address">Адрес:</label>
            <input type="text" id="contact-address">
        </div>
        <div class="field-group">
            <label for="contact-phone">Телефон:</label>
            <input type="text" id="contact-phone">
        </div>

        <div id="status-message"></div>
        <button class="save-btn" onclick="saveConfig()">Сохранить изменения</button>
    </div>

    <script>
        const CONFIG_FILE = 'site-config.json';

        document.addEventListener("DOMContentLoaded", () => {
            // Подставляем дефолтные значение ArbanSchool и arbanschool.github.io
            document.getElementById('gh-owner').value = localStorage.getItem('gh_owner') || "ArbanSchool";
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || "arbanschool.github.io";

            const hostname = window.location.hostname;
            const pathParts = window.location.pathname.split('/');
            
            if (hostname.includes('.github.io')) {
                document.getElementById('gh-owner').value = hostname.split('.')[0];
                const repoName = pathParts[1] && pathParts[1] !== "" ? pathParts[1] : hostname;
                document.getElementById('gh-repo').value = repoName;
            }

            if (localStorage.getItem('gh_token')) document.getElementById('gh-token').value = localStorage.getItem('gh_token');

            fetch(`${CONFIG_FILE}?v=${Date.now()}`)
                .then(res => res.json())
                .then(data => fillForm(data))
                .catch(err => console.log("Файл настроек считывается с сервера", err));
        });

        function fillForm(data) {
            document.getElementById('site-title').value = data.site_title || "";
            document.getElementById('logo-url').value = data.logo_url || "";
            document.getElementById('logo-fallback-text').value = data.logo_fallback_text || "A";

            if (data.books) {
                const fill = data.books.fill_color || "#FFD600";
                const stroke = data.books.stroke_color || "#8A2BE2";
                document.getElementById('book-fill-color').value = fill;
                document.getElementById('book-fill-picker').value = fill;
                document.getElementById('book-stroke-color').value = stroke;
                document.getElementById('book-stroke-picker').value = stroke;
            } else {
                document.getElementById('book-fill-color').value = "#FFD600";
                document.getElementById('book-fill-picker').value = "#FFD600";
                document.getElementById('book-stroke-color').value = "#8A2BE2";
                document.getElementById('book-stroke-picker').value = "#8A2BE2";
            }

            if (data.welcome) {
                document.getElementById('welcome-title').value = data.welcome.title || "";
                document.getElementById('welcome-subtitle').value = data.welcome.subtitle || "";
            }
            if (data.calculator) {
                document.getElementById('calc-title').value = data.calculator.title || "";
                document.getElementById('p-ind-40').value = data.calculator.price_individual_40 || 0;
                document.getElementById('p-pair-40').value = data.calculator.price_pair_40 || 0;
                document.getElementById('p-group-40').value = data.calculator.price_group_40 || 0;
                document.getElementById('p-ind-60').value = data.calculator.price_individual_60 || 0;
                document.getElementById('p-pair-60').value = data.calculator.price_pair_60 || 0;
                document.getElementById('p-group-60').value = data.calculator.price_group_60 || 0;
            }
            
            if (data.about) {
                document.getElementById('about-title').value = data.about.title || "О нас";
                const cards = data.about.cards || [];
                
                if (cards[0]) {
                    document.getElementById('c1-title').value = cards[0].title || "";
                    document.getElementById('c1-text').value = cards[0].text || "";
                }
                if (cards[1]) {
                    document.getElementById('c2-title').value = cards[1].title || "";
                    document.getElementById('c2-text').value = cards[1].text || "";
                }
                if (cards[2]) {
                    document.getElementById('c3-title').value = cards[2].title || "";
                    document.getElementById('c3-text').value = cards[2].text || "";
                }
            }

            if (data.contacts) {
                document.getElementById('contacts-title').value = data.contacts.title || "";
                document.getElementById('contact-address').value = data.contacts.address || "";
                document.getElementById('contact-phone').value = data.contacts.phone || "";
            }
        }

        async function saveConfig() {
            const token = document.getElementById('gh-token').value.trim();
            const owner = document.getElementById('gh-owner').value.trim() || "ArbanSchool";
            const repo = document.getElementById('gh-repo').value.trim() || "arbanschool.github.io";

            if (!token) {
                showStatus('Заполните токен доступа вверху!', 'error');
                return;
            }

            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_owner', owner);
            localStorage.setItem('gh_repo', repo);

            showStatus('Отправка коммита на GitHub...', 'loading');

            const cardsArray = [
                {
                    title: document.getElementById('c1-title').value,
                    text: document.getElementById('c1-text').value
                },
                {
                    title: document.getElementById('c2-title').value,
                    text: document.getElementById('c2-text').value
                },
                {
                    title: document.getElementById('c3-title').value,
                    text: document.getElementById('c3-text').value
                }
            ];

            const updatedConfig = {
                site_title: document.getElementById('site-title').value,
                logo_url: document.getElementById('logo-url').value,
                logo_fallback_text: document.getElementById('logo-fallback-text').value,
                books: {
                    fill_color: document.getElementById('book-fill-color').value || "#FFD600",
                    stroke_color: document.getElementById('book-stroke-color').value || "#8A2BE2"
                },
                welcome: {
                    title: document.getElementById('welcome-title').value,
                    subtitle: document.getElementById('welcome-subtitle').value
                },
                calculator: {
                    title: document.getElementById('calc-title').value,
                    price_individual_40: Number(document.getElementById('p-ind-40').value) || 0,
                    price_pair_40: Number(document.getElementById('p-pair-40').value) || 0,
                    price_group_40: Number(document.getElementById('p-group-40').value) || 0,
                    price_individual_60: Number(document.getElementById('p-ind-60').value) || 0,
                    price_pair_60: Number(document.getElementById('p-pair-60').value) || 0,
                    price_group_60: Number(document.getElementById('p-group-60').value) || 0
                },
                about: {
                    title: document.getElementById('about-title').value,
                    cards: cardsArray
                },
                contacts: {
                    title: document.getElementById('contacts-title').value,
                    address: document.getElementById('contact-address').value,
                    phone: document.getElementById('contact-phone').value
                }
            };

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${CONFIG_FILE}`;

            try {
                const getRes = await fetch(url, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                let sha = "";
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }

                const jsonStr = JSON.stringify(updatedConfig, null, 2);
                const utf8Bytes = new TextEncoder().encode(jsonStr);
                let binString = "";
                for (let i = 0; i < utf8Bytes.length; i++) {
                    binString += String.fromCharCode(utf8Bytes[i]);
                }
                const base64Content = btoa(binString);

                const bodyPayload = {
                    message: "Админ-панель: обновление конфигурации сайта и цвета книг",
                    content: base64Content
                };
                if (sha) bodyPayload.sha = sha;

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyPayload)
                });

                if (putRes.ok) {
                    showStatus('🎉 Успешно сохранено! Изменения появятся на основном сайте в течение минуты.', 'success');
                } else {
                    const putErr = await putRes.json();
                    showStatus(`Ошибка GitHub API: ${putErr.message}`, 'error');
                }

            } catch (err) {
                console.error(err);
                showStatus('Сетевая ошибка при запросе к репозиторию.', 'error');
            }
        }

        function showStatus(text, type) {
            const el = document.getElementById('status-message');
            el.innerText = text;
            el.className = '';
            el.style.display = 'block';

            if (type === 'success') el.classList.add('status-success');
            else if (type === 'error') el.classList.add('status-error');
            else if (type === 'loading') el.classList.add('status-loading');
        }
    </script>
</body>
</html>
