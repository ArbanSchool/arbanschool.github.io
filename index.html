<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arban School - Школа английского языка</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <style>
        :root {
            --purple: #8A2BE2;
            --purple-dark: #5A189A;
            --yellow: #FFD600;
            --yellow-dark: #FFB700;
            --text-dark: #222;
            --text-light: #FFF;
            --book-fill: #FFD600;
            --book-stroke: #8A2BE2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ПРИМАГНИЧИВАНИЕ СТРАНИЦ */
        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            background-color: var(--yellow);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Навигация */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background-color: rgba(45, 10, 80, 0.95);
            padding-top: 80px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            transform: translateX(100%);
            transition: transform 0.4s ease;
            z-index: 100;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar a {
            display: block;
            padding: 15px 30px;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            background-color: var(--purple);
            border-left: 5px solid var(--yellow);
            color: var(--yellow);
            padding-left: 40px;
        }

        /* БУРГЕР-МЕНЮ */
        .burger {
            display: block;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 101;
            cursor: pointer;
            background: var(--purple);
            padding: 12px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: none;
        }

        .burger div {
            width: 25px;
            height: 3px;
            background-color: var(--yellow);
            margin: 5px;
            transition: 0.3s;
        }

        .burger.active div:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }
        .burger.active div:nth-child(2) {
            opacity: 0;
        }
        .burger.active div:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        /* СЕКЦИИ НА ВЕСЬ ЭКРАН */
        .section-block {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            scroll-snap-align: start;
            position: relative;
        }

        /* ЭКРАН 1: Приветствие */
        #welcome-section {
            background-color: var(--yellow);
            color: var(--text-dark);
            text-align: center;
            overflow: hidden; 
        }

        #welcome-section .logo-container {
            background-color: var(--purple-dark);
            color: var(--yellow);
        }

        /* КОНТЕЙНЕР ДЛЯ АНИМАЦИИ КНИГ */
        .welcome-books-container {
            position: absolute;
            bottom: -10px;
            right: 0;
            width: 13vw;
            min-width: 140px;
            max-width: 220px;
            aspect-ratio: 240 / 180;
            pointer-events: none;
            z-index: 10;
        }

        .welcome-books-container svg {
            width: 100%;
            height: 100%;
        }

        .book {
            fill: var(--book-fill);
            stroke: var(--book-stroke);
            stroke-width: 5;
            stroke-linejoin: round;
            opacity: 0;
            transition: fill 0.3s ease, stroke 0.3s ease;
        }

        .book-details {
            stroke: var(--book-stroke);
            stroke-width: 3;
            fill: none;
            transition: stroke 0.3s ease;
        }

        .book-frame-outer {
            stroke: var(--book-stroke);
            stroke-width: 1.25;
            fill: none;
            transition: stroke 0.3s ease;
        }

        .book-frame-inner {
            stroke: var(--book-stroke);
            stroke-width: 0.75;
            stroke-dasharray: 2 2;
            fill: none;
            transition: stroke 0.3s ease;
        }

        /* НАСТРОЙКА ДИНАМИЧНОГО ПОЛЁТА С НАКЛОНАМИ И ФИНАЛЬНЫМ ВЫРАВНИВАНИЕМ */
        .book1 {
            transform-origin: 200px 350px;
            animation: dropSharp1 0.9s linear forwards;
            animation-delay: 0.1s;
        }

        .book2 {
            transform-origin: 215px 310px;
            animation: dropSharp2 0.9s linear forwards;
            animation-delay: 0.5s;
        }

        .book3 {
            transform-origin: 190px 270px;
            animation: dropSharp3 0.9s linear forwards;
            animation-delay: 0.9s;
        }

        /* Первая книга: падение с наклоном влево -> отскок вправо -> выравнивание */
        /* Первая книга */
        @keyframes dropSharp1 {
            0% {
                transform: translate(-10px, -250px) rotate(-18deg);
                opacity: 0;
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            10% { opacity: 1; }
            40% {
                transform: translate(0px, 0px) rotate(-6deg);
                animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
            }
            55% {
                transform: translate(0px, -20px) rotate(3deg);
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            70% {
                transform: translate(0px, 0px) rotate(-2deg);
                animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
            }
            85% {
                transform: translate(0px, -5px) rotate(0.5deg);
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            100% {
                transform: translate(0px, 0px) rotate(0deg);
                opacity: 1;
            }
        }

        /* Вторая книга */
        @keyframes dropSharp2 {
            0% {
                transform: translate(15px, -250px) rotate(20deg);
                opacity: 0;
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            10% { opacity: 1; }
            40% {
                transform: translate(0px, 0px) rotate(8deg);
                animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
            }
            55% {
                transform: translate(0px, -18px) rotate(-3deg);
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            70% {
                transform: translate(0px, 0px) rotate(1.5deg);
                animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
            }
            85% {
                transform: translate(0px, -4px) rotate(-0.5deg);
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            100% {
                transform: translate(0px, 0px) rotate(0deg);
                opacity: 1;
            }
        }

        /* Третья книга */
        @keyframes dropSharp3 {
            0% {
                transform: translate(-10px, -250px) rotate(-15deg);
                opacity: 0;
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            10% { opacity: 1; }
            40% {
                transform: translate(0px, 0px) rotate(-5deg);
                animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
            }
            55% {
                transform: translate(0px, -15px) rotate(2deg);
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            70% {
                transform: translate(0px, 0px) rotate(-1deg);
                animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
            }
            85% {
                transform: translate(0px, -3px) rotate(0.5deg);
                animation-timing-function: cubic-bezier(0.5, 0, 1, 1);
            }
            100% {
                transform: translate(0px, 0px) rotate(0deg);
                opacity: 1;
            }
        }
        
        /* ЭКРАН 2: О нас */
        #about-section {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: var(--text-light);
        }

        #about-section h2 {
            font-size: 3rem;
            color: var(--yellow);
            margin-bottom: 45px;
            text-align: center;
            font-weight: 800;
        }

        /* ЭКРАН 3: Калькулятор */
        #calculator-section {
            background-color: var(--yellow);
            color: var(--text-dark);
        }

        /* ЭКРАН 4: Контакты */
        #contacts-section {
            background: linear-gradient(135deg, var(--purple-dark), #3d0066);
            color: var(--text-light);
        }

        #contacts-section .card h2 {
            color: var(--purple-dark);
        }

        /* ЛОГОТИП */
        .logo-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            font-weight: 900;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            animation: scaleIn 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        .main-title {
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
            animation: fadeInUp 0.8s ease-out;
        }

        .subtitle {
            font-size: 1.6rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out;
        }

        /* СЕТКА КАРТОЧЕК */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        .about-card {
            background: white;
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 3px solid transparent;
            transform: translateY(0); 
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.35s ease, border-color 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
        }

        .about-card:hover,
        .about-card:active {
            transform: translateY(-18px) !important;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4) !important;
            border-color: var(--yellow) !important;
            cursor: pointer;
        }

        .about-card h3 {
            font-size: 1.6rem;
            color: var(--purple-dark);
            font-weight: 700;
        }

        .about-card p {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.7;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 45px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(40px);
        }

        #calculator-section .card {
            border-bottom: 8px solid var(--purple);
        }

        #contacts-section .card {
            color: var(--text-dark);
            border-bottom: 8px solid var(--purple-dark);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .about-card.visible {
            opacity: 1;
            transition: opacity 0.8s ease, transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.35s ease, border-color 0.25s ease;
        }

        .card h2 {
            font-size: 2.4rem;
            margin-bottom: 35px;
            text-align: center;
            color: var(--purple-dark);
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #444;
            font-size: 1.05rem;
        }

        .choices {
            width: 100%;
            margin-bottom: 0;
        }

        .choices__inner {
            background-color: #F8FAFC !important;
            border: 2px solid #E2E8F0 !important;
            border-radius: 14px !important;
            padding: 12px 20px !important;
            font-size: 1.1rem !important;
            color: #333 !important;
            min-height: auto !important;
            transition: all 0.3s ease;
        }

        .choices.is-focused .choices__inner,
        .choices.is-open .choices__inner {
            border-color: var(--purple) !important;
            background-color: #FFF !important;
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.15) !important;
        }

        .choices__list--dropdown {
            border: 2px solid var(--purple) !important;
            border-radius: 14px !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15) !important;
            overflow: hidden;
            margin-top: 5px;
            background: white !important;
            z-index: 100 !important;
        }

        .choices__list--dropdown .choices__item--focusable:hover {
            background-color: rgba(138, 43, 226, 0.08) !important;
            color: var(--purple-dark) !important;
        }

        .choices__list--dropdown .choices__item.is-selected {
            background-color: var(--purple) !important;
            color: white !important;
        }

        .choices[data-type="select-one"]::after {
            border: none !important;
            content: "" !important;
            position: absolute !important;
            right: 22px !important;
            top: 50% !important;
            margin-top: -5px !important;
            width: 8px !important;
            height: 8px !important;
            border-right: 2px solid var(--purple) !important;
            border-bottom: 2px solid var(--purple) !important;
            transform: rotate(45deg) !important;
            transition: transform 0.3s ease, margin-top 0.3s ease !important;
        }

        .choices.is-open[data-type="select-one"]::after {
            transform: rotate(-135deg) !important;
            margin-top: 1px !important;
        }

        button.calc-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--purple);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.3);
        }

        button.calc-btn:hover {
            background-color: var(--purple-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(138, 43, 226, 0.4);
        }

        #result {
            margin-top: 25px;
            text-align: center;
            font-size: 1.7rem;
            font-weight: bold;
            color: var(--purple-dark);
            min-height: 38px;
        }

        .contact-info {
            text-align: center;
            font-size: 1.25rem;
            line-height: 1.8;
        }

        .contact-info p {
            margin-bottom: 20px;
            color: #444;
        }

        .contact-info span {
            color: var(--purple-dark);
            font-weight: 700;
            font-size: 1.4rem;
        }

        /* Мобильная адаптация */
        @media (max-width: 992px) {
            .section-block {
                height: 100vh;
                padding: 40px 20px;
            }

            .main-title {
                font-size: 2.4rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .logo-container {
                width: 140px;
                height: 140px;
                font-size: 3.8rem;
                margin-bottom: 20px;
            }

            .welcome-books-container {
                width: 25vw;  
                min-width: 120px;
                height: auto;
                bottom: -8px;
                right: 0;
            }

            #about-section h2 {
                font-size: 2rem;
                margin-bottom: 25px;
            }

            .cards-container {
                grid-template-columns: 1fr;
                gap: 15px;
                max-height: 70vh;
                overflow-y: auto;
            }

            .about-card {
                padding: 22px 20px;
                gap: 10px;
            }

            .about-card:hover,
            .about-card:active {
                transform: translateY(-4px) !important;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25) !important;
                border-color: var(--yellow) !important;
            }

            .about-card h3 {
                font-size: 1.25rem;
            }

            .about-card p {
                font-size: 0.95rem;
                line-height: 1.5;
            }
            
            .card {
                padding: 30px 25px;
            }
            
            .card h2 {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }
        }
    </style>
</head>
<body>

    <button class="burger" id="burger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </button>

    <nav class="sidebar" id="sidebar">
        <a href="#welcome-section">Главная</a>
        <a href="#about-section">О нас</a>
        <a href="#calculator-section">Калькулятор цен</a>
        <a href="#contacts-section">Контакты</a>
    </nav>

    <header class="section-block" id="welcome-section">
        <div class="logo-container" id="logo-block">A</div>
        <h1 class="main-title" id="welcome-title">Arban School</h1>
        <p class="subtitle" id="welcome-subtitle">Эффективный английский для больших целей</p>
        
        <!-- ВСТРОЕННАЯ АНИМАЦИЯ С КНИГАМИ -->
        <div class="welcome-books-container">
            <svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
                <!-- Книга 1 (Нижняя) -->
                <g class="book book1">
                    <rect x="30" y="135" width="180" height="40" rx="6" />
                    <line x1="48" y1="135" x2="48" y2="175" class="book-details" />
                    <line x1="30" y1="148" x2="48" y2="148" class="book-details" />
                    <line x1="30" y1="162" x2="48" y2="162" class="book-details" />
                    
                    <rect x="54" y="141" width="150" height="28" rx="3" class="book-frame-outer" />
                    <rect x="56" y="143" width="146" height="24" rx="2" class="book-frame-inner" />
                </g>
                <!-- Книга 2 (Средняя) -->
                <g class="book book2">
                    <rect x="30" y="95" width="180" height="40" rx="6" />
                    <line x1="48" y1="95" x2="48" y2="135" class="book-details" />
                    <line x1="30" y1="108" x2="48" y2="108" class="book-details" />
                    <line x1="30" y1="122" x2="48" y2="122" class="book-details" />
                    
                    <rect x="54" y="101" width="150" height="28" rx="3" class="book-frame-outer" />
                    <rect x="56" y="103" width="146" height="24" rx="2" class="book-frame-inner" />
                </g>
                <!-- Книга 3 (Верхняя) -->
                <g class="book book3">
                    <rect x="30" y="55" width="180" height="40" rx="6" />
                    <line x1="48" y1="55" x2="48" y2="95" class="book-details" />
                    <line x1="30" y1="68" x2="48" y2="68" class="book-details" />
                    <line x1="30" y1="82" x2="48" y2="82" class="book-details" />
                    
                    <rect x="54" y="61" width="150" height="28" rx="3" class="book-frame-outer" />
                    <rect x="56" y="63" width="146" height="24" rx="2" class="book-frame-inner" />
                </g>
            </svg>
        </div>
    </header>

    <section class="section-block" id="about-section">
        <h2 id="about-title">О нас</h2>
        <div class="cards-container" id="cards-container"></div>
    </section>

    <section class="section-block" id="calculator-section">
        <div class="card reveal-card">
            <h2 id="calc-title">Рассчитать стоимость</h2>
            <div class="form-group">
                <label for="duration">Длительность урока:</label>
                <select id="duration">
                    <option value="40">40 минут</option>
                    <option value="60">60 минут</option>
                </select>
            </div>
            <div class="form-group">
                <label for="format">Формат обучения:</label>
                <select id="format">
                    <option value="individual">Индивидуально</option>
                    <option value="pair">В паре</option>
                    <option value="group">В группе</option>
                </select>
            </div>
            <button class="calc-btn" onclick="calculatePrice()">Узнать цену</button>
            <div id="result"></div>
        </div>
    </section>

    <section class="section-block" id="contacts-section">
        <div class="card reveal-card">
            <h2 id="contacts-title">Ждём вас на занятиях</h2>
            <div class="contact-info">
                <p>📍 Адрес нашей школы:<br><span id="contact-address">ул. Английская, д. 10, офис 404</span></p>
                <p>📞 Связаться с нами:<br><span id="contact-phone">+7 (999) 123-45-67</span></p>
            </div>
        </div>
    </section>

    <script>
        const CONFIG_FILE = 'site-config.json';
        let pricePrices = {}; 
        const revealObserver = createObserver();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('burger').classList.toggle('active');
        }

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('active');
                document.getElementById('burger').classList.remove('active');
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                new Choices(select, {
                    searchEnabled: false,
                    itemSelectText: '',
                    shouldSort: false
                });
            });

            fetch(`${CONFIG_FILE}?v=${Date.now()}`)
                .then(res => {
                    if (!res.ok) throw new Error('Конфиг не найден');
                    return res.json();
                })
                .then(data => applyConfig(data))
                .catch(err => {
                    console.warn("Загружены дефолтные настройки:", err);
                    applyDefaultConfig();
                });
        });

        function createObserver() {
            return new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("visible");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
        }

        function applyConfig(data) {
            if (data.site_title) document.title = data.site_title;
            
            const logoBlock = document.getElementById('logo-block');
            if (data.logo_url && data.logo_url.trim() !== "") {
                logoBlock.innerHTML = `<img src="${data.logo_url}" alt="Логотип">`;
            } else {
                logoBlock.innerText = data.logo_fallback_text || "A";
            }

            if (data.books) {
                if (data.books.fill_color) document.documentElement.style.setProperty('--book-fill', data.books.fill_color);
                if (data.books.stroke_color) document.documentElement.style.setProperty('--book-stroke', data.books.stroke_color);
            }

            if (data.welcome) {
                document.getElementById('welcome-title').innerText = data.welcome.title || "Arban School";
                document.getElementById('welcome-subtitle').innerText = data.welcome.subtitle || "";
            }

            if (data.calculator) {
                document.getElementById('calc-title').innerText = data.calculator.title || "Рассчитать стоимость";
                pricePrices = data.calculator;
            }

            if (data.about) {
                document.getElementById('about-title').innerText = data.about.title || "О нас";
                const container = document.getElementById('cards-container');
                container.innerHTML = "";

                const cards = data.about.cards || [];
                cards.forEach(card => {
                    const cardHtml = document.createElement('div');
                    cardHtml.className = 'about-card';
                    cardHtml.innerHTML = `
                        <h3>${card.title || 'Заголовок'}</h3>
                        <p>${card.text || 'Описание...'}</p>
                    `;
                    container.appendChild(cardHtml);
                    revealObserver.observe(cardHtml);
                });
            }

            if (data.contacts) {
                document.getElementById('contacts-title').innerText = data.contacts.title || "Ждём вас на занятиях";
                document.getElementById('contact-address').innerText = data.contacts.address || "";
                document.getElementById('contact-phone').innerText = data.contacts.phone || "";
            }

            document.querySelectorAll('.reveal-card').forEach(c => revealObserver.observe(c));
        }

        function applyDefaultConfig() {
            document.documentElement.style.setProperty('--book-fill', '#FFD600');
            document.documentElement.style.setProperty('--book-stroke', '#8A2BE2');

            pricePrices = {
                price_individual_40: 800, price_pair_40: 600, price_group_40: 400,
                price_individual_60: 1200, price_pair_60: 900, price_group_60: 600
            };

            const container = document.getElementById('cards-container');
            container.innerHTML = `
                <div class="about-card">
                    <h3>Высокое качество</h3>
                    <p>Индивидуальный подход к каждому ученику, современные материалы и методики обучения.</p>
                </div>
                <div class="about-card">
                    <h3>Опытные педагоги</h3>
                    <p>Наши преподаватели помогут преодолеть языковой барьер быстро, легко и без стресса.</p>
                </div>
                <div class="about-card">
                    <h3>Гибкий график</h3>
                    <p>Подбираем удобное время для занятий индивидуально, в парах или уютных мини-группах.</p>
                </div>
            `;
            
            document.querySelectorAll('.about-card, .reveal-card').forEach(c => revealObserver.observe(c));
        }

        function calculatePrice() {
            const duration = document.getElementById('duration').value;
            const format = document.getElementById('format').value;
            const resultDiv = document.getElementById('result');
            
            let price = 0;
            let suffix = " ₽ / урок";

            if (duration === "40") {
                if (format === "individual") price = pricePrices.price_individual_40 || 800;
                else if (format === "pair") { price = pricePrices.price_pair_40 || 600; suffix += " (с человека)"; }
                else if (format === "group") { price = pricePrices.price_group_40 || 400; suffix += " (с человека)"; }
            } else if (duration === "60") {
                if (format === "individual") price = pricePrices.price_individual_60 || 1200;
                else if (format === "pair") { price = pricePrices.price_pair_60 || 900; suffix += " (с человека)"; }
                else if (format === "group") { price = pricePrices.price_group_60 || 600; suffix += " (с человека)"; }
            }

            resultDiv.style.opacity = 0;
            setTimeout(() => {
                resultDiv.innerText = "Стоимость: " + price + suffix;
                resultDiv.style.transition = "opacity 0.4s ease";
                resultDiv.style.opacity = 1;
            }, 150);
        }
    </script>
</body>
</html>
